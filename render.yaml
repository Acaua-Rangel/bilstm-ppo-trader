services:
  - type: web
    name: ai-spot-trading-frontend
    env: static
    rootDir: ai-spot-trading-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://apex-vision.onrender.com
      # O VITE_GOOGLE_CLIENT_ID você precisa preencher diretamente na Dashboard
      # do Render por segurança, por isso definimos sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
